<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón Admin | LoanWare</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="publico.css">
    <style>
        .mailbox-layout { display: grid; grid-template-columns: 380px 1fr; gap: 25px; margin-top: 30px; }
        .msg-list-container { max-height: 650px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-item { background: white; padding: 20px; border-radius: 15px; cursor: pointer; border: 2px solid transparent; box-shadow: var(--shadow); position: relative; }
        .msg-item:hover { border-color: var(--accent); }
        .msg-item.unread::before { content: ''; position: absolute; top: 15px; right: 15px; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        .msg-date-tag { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); margin-top: 10px; display: block; }
        .viewer-header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        @media (max-width: 992px) { .mailbox-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo"><i class="fas fa-microchip"></i><h1>Loan<span>Ware</span></h1></div>
            <div class="main-nav">
                <span style="color:white; font-size: 0.8rem;"><i class="fas fa-user-shield" style="color: var(--accent);"></i> ADMIN</span>
                <a href="perfil.html" class="btn-login">MI PERFIL</a>
            </div>
        </div>
    </header>

    <nav class="header" style="background-color: var(--primary); border-top: 1px solid rgba(255,255,255,0.1); padding: 5px 0;">
        <div class="header-container main-nav">
            <a href="adminDashboard.html">Inicio</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Solicitudes</a>
            <a href="usuario.html">Usuarios</a>
            
            <div class="dropdown" style="display: inline-block; position: relative;">
                <a href="#" class="dropbtn">
                    Catálogos <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
                </a>
                <div class="dropdown-content">
                    <a href="marca.html"><i class="fas fa-tag" style="color: var(--accent);"></i> Marca</a>
                    <a href="categoria.html"><i class="fas fa-layer-group" style="color: var(--accent);"></i> Categoría</a>
                </div>
            </div>

            <div class="dropdown" style="display: inline-block; position: relative;">
                <a href="#" class="dropbtn">
                    Movimientos <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
                </a>
                <div class="dropdown-content">
                    <a href="prestamos.html"><i class="fas fa-arrow-up" style="color: var(--accent);"></i> Préstamos</a>
                    <a href="devoluciones.html"><i class="fas fa-arrow-down" style="color: var(--accent);"></i> Devoluciones</a>
                </div>
            </div>

            <div class="dropdown" style="display: inline-block; position: relative;">
                <a href="#" class="dropbtn">
                    Acerca de... <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
                </a>
                <div class="dropdown-content">
                    <a href="quienes.html"><i class="fas fa-users"></i> Quiénes Somos</a>
                    <a href="mision.html"><i class="fas fa-bullseye"></i> Misión</a>
                    <a href="vision.html"><i class="fas fa-eye"></i> Visión</a>
                </div>
            </div>

            <a href="ajustes_footer.html"><i class="fas fa-cog"></i> Ajustes</a>
            <a href="contacto.html"><i class="fas fa-envelope"></i> Buzon</a>

        </div>
    </nav>

    <main class="container" style="padding: 40px 20px;">
        <div class="section-header">
            <span class="tag">Administración</span>
            <h2>Buzón de <span style="color: var(--primary);">Mensajes</span></h2>
            <div class="line"></div>
        </div>

        <div class="mailbox-layout">
            <div class="msg-list-container" id="listaMensajes">
                </div>

            <div class="card" id="visorMensaje" style="min-height: 500px; display: flex; flex-direction: column; padding: 30px;">
                <div style="text-align: center; margin-top: 100px; color: var(--text-muted);">
                    <i class="fas fa-envelope-open-text" style="font-size: 4rem; opacity: 0.2;"></i>
                    <p>Selecciona un mensaje para leerlo</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/contacto.js"></script>
</body>
</html>
